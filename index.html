<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="sidebar">
  <h2>Hidden AI</h2>
  <button>+ New Chat</button>
  <ul>
    <li>Chat History</li>
    <li>Image Generator</li>
    <li>Settings</li>
  </ul>
</div>

<main class="main">
  <header>
    <h1>Hidden AI</h1>
    <p>Think Beyond What's Visible.</p>
  </header>

  <section id="chat">
    <div class="message ai">
      <strong>Hidden AI:</strong> Welcome! Ask me anything.
    </div>
  </section>

  <form id="chatForm">
    <input id="prompt" placeholder="Type your message..." autocomplete="off">
    <button type="submit">Send</button>
  </form>
</main>

<script src="script.js"></script>
</body>
</html>
